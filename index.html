<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F1B2D">
    <meta name="description" content="صالة الإنجاز — منصة لتسجيل ساعات الدراسة والمنافسة بين الأصدقاء">
    <title>صالة الإنجاز</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%230F1B2D' stroke='%23D4AF37' stroke-width='4'/%3E%3Cpath d='M50 28 L50 50 L66 60' stroke='%23D4AF37' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23D4AF37'/%3E%3C/svg%3E">
</head>
<body>
    <!-- Decorative Islamic geometric pattern background -->
    <div class="pattern-bg" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
                <pattern id="islamic-pattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
                    <g fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.5">
                        <polygon points="60,10 90,30 90,70 60,90 30,70 30,30" />
                        <polygon points="60,25 78,38 78,62 60,75 42,62 42,38" />
                        <line x1="60" y1="10" x2="60" y2="25" />
                        <line x1="90" y1="30" x2="78" y2="38" />
                        <line x1="90" y1="70" x2="78" y2="62" />
                        <line x1="60" y1="90" x2="60" y2="75" />
                        <line x1="30" y1="70" x2="42" y2="62" />
                        <line x1="30" y1="30" x2="42" y2="38" />
                        <circle cx="60" cy="50" r="6" />
                    </g>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#islamic-pattern)" />
        </svg>
    </div>

    <!-- Header / Navigation -->
    <header class="app-header">
        <div class="brand">
            <div class="brand-icon" aria-hidden="true">
                <svg viewBox="0 0 100 100" width="44" height="44">
                    <circle cx="50" cy="50" r="44" fill="none" stroke="url(#brandGradient)" stroke-width="3"/>
                    <path d="M50 22 L50 50 L70 62" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" fill="none"/>
                    <circle cx="50" cy="50" r="4" fill="#D4AF37"/>
                    <defs>
                        <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#D4AF37"/>
                            <stop offset="100%" stop-color="#E8C763"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="brand-text">
                <h1>صالة الإنجاز</h1>
                <p class="tagline">سجّل وقتك. ارفع همّتك.</p>
            </div>
        </div>

        <nav class="tabs" role="tablist" aria-label="التنقل الرئيسي">
            <button
                class="tab active"
                role="tab"
                aria-selected="true"
                aria-controls="panel-log"
                id="tab-log"
                data-tab="log">
                <span class="tab-icon" aria-hidden="true">🕐</span>
                <span>تسجيل الجلسة</span>
            </button>
            <button
                class="tab"
                role="tab"
                aria-selected="false"
                aria-controls="panel-leaderboard"
                id="tab-leaderboard"
                data-tab="leaderboard">
                <span class="tab-icon" aria-hidden="true">🏆</span>
                <span>لوحة المتصدرين</span>
            </button>
        </nav>
    </header>

    <!-- Main content -->
    <main class="app-main">

        <!-- ===== Section 1: Log Study Hours ===== -->
        <section
            class="panel active"
            id="panel-log"
            role="tabpanel"
            aria-labelledby="tab-log">

            <div class="card clock-card">
                <header class="card-header">
                    <h2>كم ساعة درست؟</h2>
                    <p class="card-subtitle">اسحب العقارب لاختيار مدة الجلسة</p>
                </header>

                <!-- The drag clock -->
                <div class="clock-wrapper">
                    <svg
                        class="clock"
                        viewBox="0 0 400 400"
                        role="application"
                        aria-label="ساعة لاختيار مدة الدراسة بالسحب">

                        <!-- Outer rim glow -->
                        <defs>
                            <radialGradient id="rimGlow" cx="50%" cy="50%" r="50%">
                                <stop offset="85%" stop-color="rgba(212,175,55,0)"/>
                                <stop offset="100%" stop-color="rgba(212,175,55,0.3)"/>
                            </radialGradient>
                            <linearGradient id="faceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#1A2440"/>
                                <stop offset="100%" stop-color="#0F1B2D"/>
                            </linearGradient>
                            <linearGradient id="hourHandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#D4AF37"/>
                                <stop offset="100%" stop-color="#E8C763"/>
                            </linearGradient>
                            <linearGradient id="minuteHandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#E8C763"/>
                                <stop offset="100%" stop-color="#F5DA8C"/>
                            </linearGradient>
                            <filter id="goldGlow">
                                <feGaussianBlur stdDeviation="3" result="blur"/>
                                <feMerge>
                                    <feMergeNode in="blur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>

                        <circle cx="200" cy="200" r="195" fill="url(#rimGlow)"/>
                        <circle cx="200" cy="200" r="180" fill="url(#faceGradient)" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.6"/>
                        <circle cx="200" cy="200" r="172" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.3"/>

                        <!-- Tick marks (drawn by JS) -->
                        <g id="clock-ticks"></g>

                        <!-- Hour numerals (drawn by JS) -->
                        <g id="clock-numerals"></g>

                        <!-- Hour hand (drag) -->
                        <g id="hour-hand-group" class="hand-group" tabindex="0" role="slider"
                           aria-label="عقرب الساعات"
                           aria-valuemin="0" aria-valuemax="12" aria-valuenow="0">
                            <line x1="200" y1="200" x2="200" y2="100"
                                  stroke="url(#hourHandGradient)"
                                  stroke-width="10" stroke-linecap="round"
                                  filter="url(#goldGlow)"
                                  class="hour-hand"/>
                            <circle cx="200" cy="100" r="14" fill="#D4AF37" class="hand-knob hour-knob"/>
                        </g>

                        <!-- Minute hand (drag) -->
                        <g id="minute-hand-group" class="hand-group" tabindex="0" role="slider"
                           aria-label="عقرب الدقائق"
                           aria-valuemin="0" aria-valuemax="59" aria-valuenow="0">
                            <line x1="200" y1="200" x2="200" y2="60"
                                  stroke="url(#minuteHandGradient)"
                                  stroke-width="6" stroke-linecap="round"
                                  filter="url(#goldGlow)"
                                  class="minute-hand"/>
                            <circle cx="200" cy="60" r="11" fill="#E8C763" class="hand-knob minute-knob"/>
                        </g>

                        <!-- Center cap -->
                        <circle cx="200" cy="200" r="10" fill="#D4AF37" stroke="#0F1B2D" stroke-width="3"/>
                        <circle cx="200" cy="200" r="3" fill="#0F1B2D"/>
                    </svg>
                </div>

                <!-- Live readout -->
                <div class="readout" aria-live="polite">
                    <div class="readout-time" id="readout-time">لم تسجل بعد</div>
                    <div class="readout-digital" id="readout-digital">٠٠:٠٠</div>
                </div>

                <!-- Form fields -->
                <div class="form-fields">
                    <div class="field">
                        <label for="user-name">اسمك</label>
                        <input
                            type="text"
                            id="user-name"
                            placeholder="اكتب اسمك هنا"
                            autocomplete="name"
                            maxlength="40"
                            required>
                    </div>

                    <div class="field">
                        <label for="session-date">تاريخ الجلسة</label>
                        <input type="date" id="session-date" required>
                        <div class="date-display" id="date-display"></div>
                    </div>
                </div>

                <button class="btn-submit" id="btn-submit" type="button">
                    <span class="btn-label">تسجيل الجلسة</span>
                    <span class="btn-spinner" aria-hidden="true"></span>
                </button>
            </div>
        </section>

        <!-- ===== Section 2: Leaderboard ===== -->
        <section
            class="panel"
            id="panel-leaderboard"
            role="tabpanel"
            aria-labelledby="tab-leaderboard"
            hidden>

            <div class="card leaderboard-card">
                <header class="card-header leaderboard-header">
                    <div>
                        <h2>لوحة المتصدرين</h2>
                        <p class="card-subtitle">من أكثر إنجازاً اليوم؟</p>
                    </div>
                    <button class="btn-refresh" id="btn-refresh" aria-label="تحديث القائمة">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 0 1 15.3-6.4L21 8"/>
                            <path d="M21 3v5h-5"/>
                            <path d="M21 12a9 9 0 0 1-15.3 6.4L3 16"/>
                            <path d="M3 21v-5h5"/>
                        </svg>
                    </button>
                </header>

                <!-- Period filter -->
                <div class="period-filter" role="tablist" aria-label="الفترة الزمنية">
                    <button class="period-btn active" data-period="today" role="tab" aria-selected="true">اليوم</button>
                    <button class="period-btn" data-period="week" role="tab" aria-selected="false">هذا الأسبوع</button>
                    <button class="period-btn" data-period="month" role="tab" aria-selected="false">هذا الشهر</button>
                    <button class="period-btn" data-period="all" role="tab" aria-selected="false">كل الأوقات</button>
                </div>

                <!-- Leaderboard list -->
                <div class="leaderboard-list" id="leaderboard-list">
                    <div class="leaderboard-loading">
                        <div class="spinner"></div>
                        <p>جاري تحميل اللوحة…</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="assertive"></div>

    <!-- Confetti container -->
    <div class="confetti-container" id="confetti-container" aria-hidden="true"></div>

    <!-- ===== Personal stats modal ===== -->
    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button class="modal-close" id="modal-close" aria-label="إغلاق">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>

            <header class="modal-header">
                <div class="modal-avatar" id="modal-avatar">؟</div>
                <h3 id="modal-title">—</h3>
                <p class="modal-subtitle" id="modal-subtitle">—</p>
            </header>

            <div class="modal-stats">
                <div class="stat-card">
                    <div class="stat-label">المجموع الكلي</div>
                    <div class="stat-value" id="stat-total">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">المعدل اليومي</div>
                    <div class="stat-value" id="stat-average">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">أطول سلسلة</div>
                    <div class="stat-value" id="stat-longest">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">السلسلة الحالية</div>
                    <div class="stat-value" id="stat-current">—</div>
                </div>
            </div>

            <div class="chart-section">
                <h4>الأيام السبعة الماضية</h4>
                <svg id="weekly-chart" viewBox="0 0 350 160" aria-label="رسم بياني لآخر سبعة أيام"></svg>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>صنع بشغل لآل سمو</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
